<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryLSTM — Browser Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #1a1a2e;
    color: #e0d6c2;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 700px; width: 100%; }
  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 0.25rem;
    color: #f0a050;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #888;
    margin-bottom: 1.5rem;
  }
  .status-bar {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .progress-track {
    width: 100%;
    height: 4px;
    background: #0f3460;
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #f0a050, #e94560);
    border-radius: 2px;
    transition: width 0.15s;
    width: 0%;
  }
  .status-text {
    font-size: 0.8rem;
    color: #888;
    min-height: 1.2em;
  }
  .prompt-box {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }
  .prompt-box input {
    flex: 1;
    padding: 0.75rem 1rem;
    font-size: 1.1rem;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 8px;
    color: #e0d6c2;
    font-family: 'Georgia', serif;
  }
  .prompt-box input:focus {
    outline: none;
    border-color: #f0a050;
  }
  .prompt-box input:disabled { opacity: 0.4; }
  .prompt-box button {
    padding: 0.75rem 1.5rem;
    font-size: 1.1rem;
    background: #f0a050;
    color: #1a1a2e;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .prompt-box button:hover { background: #f5b870; }
  .prompt-box button:disabled { background: #555; cursor: not-allowed; }
  .story {
    background: #16213e;
    border-radius: 12px;
    padding: 1.5rem 2rem;
    line-height: 1.8;
    font-size: 1.05rem;
    min-height: 120px;
    white-space: pre-wrap;
  }
  .story .prompt-part { color: #f0a050; }
  .story .loading-text { color: #888; }
  .examples {
    margin-top: 2rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .examples button {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
    background: transparent;
    border: 1px solid #0f3460;
    border-radius: 6px;
    color: #aaa;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.2s;
  }
  .examples button:hover {
    border-color: #f0a050;
    color: #f0a050;
  }
  .examples button:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <h1>StoryLSTM</h1>
  <p class="subtitle">9.8M params · LSTM · ROCStories · runs entirely in your browser</p>

  <div class="status-bar">
    <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
    <div class="status-text" id="status">Loading...</div>
  </div>

  <div class="prompt-box">
    <input type="text" id="prompt" placeholder="Start a story... (e.g. Tom was)" disabled>
    <button id="generate" disabled>Generate</button>
  </div>

  <div class="story" id="story"></div>

  <div class="examples" id="examples">
    <button onclick="quickPrompt('The cat')" disabled>The cat</button>
    <button onclick="quickPrompt('She walked')" disabled>She walked</button>
    <button onclick="quickPrompt('One day')" disabled>One day</button>
    <button onclick="quickPrompt('My friend')" disabled>My friend</button>
    <button onclick="quickPrompt('The rain')" disabled>The rain</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.min.js"></script>
<script>
// ============================================================
// DOM refs
// ============================================================
const $progress  = document.getElementById('progress');
const $status    = document.getElementById('status');
const $story     = document.getElementById('story');
const $prompt    = document.getElementById('prompt');
const $genBtn    = document.getElementById('generate');
const $exBtns    = document.querySelectorAll('#examples button');

// ============================================================
// STATE
// ============================================================
let session = null;
let vocab   = null;
let config  = null;
let tokenizer = null;
let running = false;

// ============================================================
// TOKENIZER — longest-prefix-match (approximate BPE)
// ============================================================
function buildTokenizer(vocabList) {
  const sorted = vocabList
    .map((t, i) => ({ tok: t, id: i }))
    .sort((a, b) => b.tok.length - a.tok.length);

  return {
    encode(text) {
      const ids = [];
      let i = 0;
      while (i < text.length) {
        let matched = false;
        for (const { tok, id } of sorted) {
          if (!tok) continue;
          if (text.startsWith(tok, i)) {
            ids.push(id);
            i += tok.length;
            matched = true;
            break;
          }
        }
        if (!matched) { ids.push(config.UNK); i++; }
      }
      return ids;
    },
    decode(ids) {
      const SPECIALS = new Set(['<PAD>','<UNK>','<SOS>','<EOS>']);
      return ids.map(id => {
        const t = vocabList[id];
        if (t === undefined || SPECIALS.has(t)) return null;
        return t;
      }).filter(Boolean).join(' ');
    }
  };
}

// ============================================================
// LOADING
// ============================================================
async function loadAll() {
  try {
    // --- Vocab + config (tiny, load first) ---
    $status.textContent = 'Loading vocab...';
    const [vocabResp, configResp] = await Promise.all([
      fetch('vocab.json'),
      fetch('config.json')
    ]);
    vocab  = await vocabResp.json();
    config = await configResp.json();
    tokenizer = buildTokenizer(vocab);
    $status.textContent = `Vocab: ${vocab.length} tokens. Downloading model (37 MB)...`;

    // --- ONNX model with progress ---
    const modelResp = await fetch('storylstm.onnx');
    if (!modelResp.ok) throw new Error(`HTTP ${modelResp.status}`);
    const contentLength = +modelResp.headers.get('Content-Length') || 37_500_000;
    const reader = modelResp.body.getReader();
    const chunks = [];
    let received = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      received += value.length;
      $progress.style.width = Math.min(100, (received / contentLength) * 100) + '%';
      $status.textContent = `Downloading model... ${(received / 1024 / 1024).toFixed(1)} MB`;
    }

    // Assemble ArrayBuffer
    const buffer = new ArrayBuffer(received);
    const view   = new Uint8Array(buffer);
    let offset = 0;
    for (const chunk of chunks) {
      view.set(chunk, offset);
      offset += chunk.length;
    }

    // Load ONNX
    $status.textContent = 'Parsing model...';
    session = await ort.InferenceSession.create(buffer, {
      executionProviders: ['wasm'],
      graphOptimizationLevel: 'all'
    });

    // Done
    $progress.style.width = '100%';
    $progress.style.background = '#4ecca3';
    $status.textContent = 'Ready! Type a prompt and press Generate.';
    enableUI(true);

  } catch (err) {
    $status.textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

function enableUI(on) {
  $prompt.disabled = !on;
  $genBtn.disabled = !on;
  $exBtns.forEach(b => b.disabled = !on);
  if (on) $prompt.focus();
}

// ============================================================
// GENERATION
// ============================================================
async function generate(prompt) {
  if (running || !session) return;
  running = true;
  enableUI(false);
  $genBtn.textContent = '...';
  $status.textContent = 'Generating...';

  const fullPrompt = '<SOS> ' + prompt.trim();
  const promptIds = tokenizer.encode(fullPrompt);
  let generatedIds = [...promptIds];
  let eosCount = 0;

  $story.innerHTML = '<span class="prompt-part">' + esc(prompt) + '</span> <span class="loading-text">...</span>';

  const maxNew   = 150;
  const targetSents = 5;
  const temp     = 0.8;
  const vocabSize = vocab.length;
  const PAD = config.PAD;
  const EOS = config.EOS;

  for (let step = 0; step < maxNew; step++) {
    // Feed full sequence so far (LSTM recomputes from scratch each step — fine for short seqs)
    const bigints = generatedIds.map(n => BigInt(n));
    const inputTensor = new ort.Tensor('int64', BigInt64Array.from(bigints), [1, generatedIds.length]);

    const outputs = await session.run({ input_ids: inputTensor });
    const logits = outputs.logits.data;  // Float32Array [1, seq_len, 8000]

    // Last-position logits
    const lastOffset = (generatedIds.length - 1) * vocabSize;
    let maxLogit = -Infinity;
    for (let i = 0; i < vocabSize; i++) {
      const v = logits[lastOffset + i] / temp;
      if (v > maxLogit) maxLogit = v;
      logits[lastOffset + i] = v; // reuse array for temp-scaled values
    }

    // Softmax (subtract max for numerical stability)
    let expSum = 0;
    const probs = new Float32Array(vocabSize);
    for (let i = 0; i < vocabSize; i++) {
      const e = Math.exp(logits[lastOffset + i] - maxLogit);
      probs[i] = e;
      expSum += e;
    }

    // Sample
    const r = Math.random() * expSum;
    let cum = 0, nextId = config.UNK;
    for (let i = 0; i < vocabSize; i++) {
      cum += probs[i];
      if (r <= cum) { nextId = i; break; }
    }

    generatedIds.push(nextId);

    if (nextId === EOS) {
      eosCount++;
      if (eosCount >= targetSents) break;
    }
  }

  // Decode and display
  const fullText = tokenizer.decode(generatedIds);
  const promptText = tokenizer.decode(promptIds);
  const continuation = fullText.slice(promptText.length).trim();

  $story.innerHTML = '<span class="prompt-part">' + esc(prompt) + '</span> ' + esc(continuation);
  $status.textContent = 'Done.';

  running = false;
  enableUI(true);
  $genBtn.textContent = 'Generate';
  $prompt.focus();
}

function quickPrompt(text) {
  $prompt.value = text;
  generate(text);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ============================================================
// EVENTS
// ============================================================
$genBtn.addEventListener('click', () => {
  const p = $prompt.value.trim();
  if (p) generate(p);
});
$prompt.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const p = $prompt.value.trim();
    if (p) generate(p);
  }
});

// Boot
loadAll();
</script>
</body>
</html>
